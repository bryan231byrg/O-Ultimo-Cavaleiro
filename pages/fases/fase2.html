<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fase 2 - Ruínas da Cidade</title>

    <link rel="stylesheet" href="../../CSS/fases.css">
</head>

<body class="fase2">

<div id="container">

    <header id="topo">
        <div class="titulo">
            <h1>FASE 2</h1>
            <p>Ruínas da Cidade</p>
        </div>

        <div id="status-player">
            <div class="status"><span>Personagem</span><strong id="nomePersonagem">-</strong></div>
            <div class="status"><span>Vida</span><strong id="vidaPersonagem">100</strong></div>

        </div>
    </header>

    <section id="historia">
        <h2>História</h2>
        <p>
            As ruínas da antiga cidade revelam o que restou da civilização. Orcs dominam as ruas destruídas.
        </p>
    </section>

    <main id="campoBatalha">

        <section id="player">
                <img src="../../img/assents/personagem.jpg" alt="Cavaleiro">
            <h2 id="playerNome">Cavaleiro</h2>
        </section>

        <section id="vs">VS</section>

        <section id="enemy">
            <img id="imgEnemy" src="../../img/assents/soldado-corrompido.jpg">
            <h2 id="enemyName">Orc Soldado</h2>
            <p>Vida: <span id="enemyLife">60</span></p>
        </section>

    </main>

    <section id="combate">
        <button id="btnAtacar">⚔ Atacar</button>
    </section>

    <section id="log">
        <div id="logMensagens"><p>Um Orc aparece entre as ruínas...</p></div>
    </section>

</div>

    <script src="../../JS/game.js"></script>
</body>
</html>
