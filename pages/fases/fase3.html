<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fase 3 - Castelo de Valória</title>

    <link rel="stylesheet" href="../../CSS/fases.css">
</head>

<body class="fase3">

<div id="container">

    <header id="topo">
        <div class="titulo">
            <h1>FASE 3</h1>
            <p>Castelo de Valória</p>
        </div>

        <div id="status-player">
            <div class="status"><span>Personagem</span><strong id="nomePersonagem">-</strong></div>
            <div class="status"><span>Vida</span><strong id="vidaPersonagem">100</strong></div>

        </div>
    </header>

    <section id="historia">
        <h2>História</h2>
        <p>
            No topo do castelo destruído, o Dragão Ancestral desperta para o combate final.
        </p>
    </section>

    <main id="campoBatalha">

        <section id="player">
                <img src="../../img/assents/personagem.jpg" alt="Cavaleiro">
            <h2 id="playerNome">Cavaleiro</h2>
        </section>

        <section id="vs">VS</section>

        <section id="enemy">
            <img id="imgEnemy" src="../../img/assents/entidade-do-caos.jpg">
            <h2 id="enemyName">Dragão Ancestral</h2>
            <p>Vida: <span id="enemyLife">200</span></p>
        </section>

    </main>

    <section id="combate">
        <button id="btnAtacar">⚔ Atacar</button>
    </section>

    <section id="log">
        <div id="logMensagens"><p>O Dragão ruge e o chão treme...</p></div>
    </section>

</div>

    <script src="../../JS/game.js"></script>
</body>
</html>
